<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync-Web | Secure Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-gray-100 font-sans min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <div class="absolute w-96 h-96 bg-indigo-600/20 rounded-full blur-[120px] -top-20 -left-20"></div>
    <div class="absolute w-96 h-96 bg-emerald-600/20 rounded-full blur-[120px] -bottom-20 -right-20"></div>

    <div class="w-full max-w-md p-8 mx-4 bg-[#131a2c]/60 backdrop-blur-xl border border-gray-800 rounded-2xl shadow-2xl relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">SYNC-WEB</h1>
            <p class="text-gray-400 text-xs mt-2 tracking-wider uppercase">Enterprise Simulation Access Gateway</p>
        </div>

        <div id="error-alert" class="hidden mb-4 p-3 rounded-lg bg-red-900/40 border border-red-500/50 text-red-300 text-sm font-mono text-center"></div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-mono tracking-widest text-indigo-300 uppercase mb-2">Operator Username</label>
                <input type="text" id="username" required placeholder="Enter username..." class="w-full px-4 py-3 bg-[#0b0f19]/80 border border-gray-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-900/50 transition font-mono text-sm text-white">
            </div>
            <div>
                <label class="block text-xs font-mono tracking-widest text-indigo-300 uppercase mb-2">Security Keyphrase</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-3 bg-[#0b0f19]/80 border border-gray-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-900/50 transition font-mono text-sm text-white">
            </div>
            <button type="submit" class="w-full py-3 px-4 mt-2 bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 text-white font-bold tracking-wider rounded-xl shadow-lg shadow-indigo-950 transition-all transform active:scale-[0.98]">
                INITIALIZE CORE SYSTEM
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errAlert = document.getElementById('error-alert');
            errAlert.classList.add('hidden');

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();

            if(data.success) {
                window.location.href = '/dashboard';
            } else {
                errAlert.textContent = data.message;
                errAlert.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
